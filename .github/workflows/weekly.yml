name: Weekly Comprehensive Tests

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Full test suite with coverage
        run: pytest --cov=edb --cov-report=xml --cov-report=term-missing -v --tb=long

      - name: Security audit - dependencies
        run: |
          pip install pip-audit safety
          pip-audit --strict
          safety check || true

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --force-use-all-plugins 2>&1 | \
            grep -v "ArtifactoryDetector\|AWSKeyDetector" || true

      - name: SAST scan
        run: |
          pip install bandit
          bandit -r src/edb/ -ll -ii || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
